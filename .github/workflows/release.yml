name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - next
          - alpha
          - beta
          - rc
          - canary
          - custom
      dist_tag:
        description: "Custom npm dist-tag (required when channel=custom)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Run release pipeline without publish/push"
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref }}-${{ inputs.channel }}-${{ inputs.dist_tag || 'default' }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Releases must run from main."
            exit 1
          fi

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release guard
        run: node ./scripts/release-guard.mjs --channel ${{ inputs.channel }} --dist-tag "${{ inputs.dist_tag }}"

      - name: Resolve release target
        id: release_target
        run: |
          CHANNEL="${{ inputs.channel }}"
          DIST_TAG_INPUT="${{ inputs.dist_tag }}"

          if [ "$CHANNEL" = "stable" ]; then
            RELEASE_TAG="latest"
            PRE_MODE=""
            IS_PRERELEASE="false"
          elif [ "$CHANNEL" = "custom" ]; then
            RELEASE_TAG="$DIST_TAG_INPUT"
            PRE_MODE="$DIST_TAG_INPUT"
            IS_PRERELEASE="true"
          else
            RELEASE_TAG="$CHANNEL"
            PRE_MODE="$CHANNEL"
            IS_PRERELEASE="true"
          fi

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "pre_mode=$PRE_MODE" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Release preflight
        run: pnpm release:preflight

      - name: Validate
        run: pnpm validate

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Enter prerelease mode
        if: ${{ steps.release_target.outputs.is_prerelease == 'true' }}
        run: pnpm changeset pre enter ${{ steps.release_target.outputs.pre_mode }}

      - name: Show release status
        run: pnpm changeset status

      - name: Version packages
        run: pnpm changeset version

      - name: Configure npm auth
        if: ${{ !inputs.dry_run }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is required for publish."
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      - name: Publish packages
        if: ${{ !inputs.dry_run }}
        run: pnpm changeset publish --tag ${{ steps.release_target.outputs.tag }}

      - name: Exit prerelease mode
        if: ${{ steps.release_target.outputs.is_prerelease == 'true' }}
        run: pnpm changeset pre exit

      - name: Commit release artifacts
        if: ${{ !inputs.dry_run }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(release): ${{ inputs.channel }} (${{ steps.release_target.outputs.tag }}) release"
            git push origin main
          fi
          git push --follow-tags origin main

      - name: Release summary
        run: |
          echo "channel=${{ inputs.channel }}"
          echo "dist_tag_input=${{ inputs.dist_tag }}"
          echo "resolved_tag=${{ steps.release_target.outputs.tag }}"
          echo "prerelease=${{ steps.release_target.outputs.is_prerelease }}"
          echo "dry_run=${{ inputs.dry_run }}"
