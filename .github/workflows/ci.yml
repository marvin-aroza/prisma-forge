name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Guard breaking token changes
        if: ${{ github.event_name == 'pull_request' }}
        run: node ./scripts/token-breaking-guard.mjs --base-ref origin/${{ github.base_ref }}
      - name: Validate
        run: pnpm validate
      - name: Run tests
        run: pnpm test
      - name: Build
        run: pnpm build
